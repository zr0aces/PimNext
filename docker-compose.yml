services:
  notanext:
    # Default: pulls the pre-built image from GitHub Container Registry.
    # To build locally instead, run: docker compose up -d --build
    image: ${DOCKER_IMAGE:-ghcr.io/zr0aces/notanext:1.1.1}
    build:
      context: .
      args:
        VERSION: "1.1.1"
    container_name: notanext
    restart: always
    environment:
      - CUPS_SERVER=cups
      - PRINTER_NAME=Canon_LBP7110Cw
      - TZ=Asia/Bangkok
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    volumes:
      # Persist the preferences file (data/preferences.json) across container
      # recreations.  The host directory is created automatically by Docker if
      # it does not yet exist.
      - ./data:/app/data
    # Prevent unbounded log growth on long-running hosts (e.g. Raspberry Pi SD card)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
