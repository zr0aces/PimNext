services:
  printbot:
    build:
      context: .
      args:
        VERSION: "1.0.5"
    container_name: printbot
    restart: always
    environment:
      - CUPS_SERVER=cups
      - PRINTER_NAME=Canon_LBP7110Cw
      - TZ=Asia/Bangkok
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
